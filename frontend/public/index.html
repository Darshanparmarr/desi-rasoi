<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#003158" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Akshar E-Commerce" />
    <meta
      name="description"
      content="Akshar E-Commerce - Authentic homemade Indian products. Shop papads, pickles, masalas, mukhwas, snacks and sweets. Free shipping on orders above ₹500."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Akshar E-Commerce - Authentic Homemade Indian Products</title>
    <style>
      /* Mobile-optimized CSS */
      * {
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      /* Ensure touch targets are at least 44x44px */
      button, a, input[type="submit"], input[type="button"] {
        min-height: 44px;
        min-width: 44px;
      }
      
      /* Prevent text zoom on iOS */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px;
        }
      }
      
      /* Smooth scrolling for mobile */
      body {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-y: none;
      }
      
      /* Hide scrollbar but keep functionality */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    -->

</html>
